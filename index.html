<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Temp Cal 전자 기록 시스템 - Forced Stretch Cell Fill</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<style>
:root{
  --ink:#3a3a3a; --sub:#8a8a8a; --line:#e6e6e6; --bg:#fff; --soft:#f7f7f7;
  --red:#d43c33; --red-bg:#fdeceb; --ok:#2e8b57; --ok-bg:#eaf5ef;
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard','Malgun Gothic','Apple SD Gothic Neo',sans-serif; color:var(--ink); background:var(--bg); font-weight:400; font-size:15px; line-height:1.5}
button{font-family:inherit; cursor:pointer}
input,select{font-family:inherit; font-size:15px}

header{position:sticky; top:0; z-index:50; background:#fff; border-bottom:1px solid var(--line); padding:0 16px; height:52px; display:flex; align-items:center; gap:10px}
header .logo{font-weight:600; font-size:16px; letter-spacing:-.2px}
header .logo b{color:var(--red); font-weight:600}
header .spacer{flex:1}
header .who{font-size:13px; color:var(--sub)}
header .who strong{color:var(--ink); font-weight:500}
.iconbtn{background:none; border:1px solid var(--line); border-radius:8px; padding:5px 10px; font-size:13px; color:var(--ink)}
.iconbtn:active{background:var(--soft)}

main{max-width:960px; margin:0 auto; padding:20px 16px 80px}
h2{font-size:19px; font-weight:600; margin-bottom:4px; letter-spacing:-.3px}
.desc{color:var(--sub); font-size:13px; margin-bottom:18px}

.btn{border:none; border-radius:10px; padding:12px 18px; font-size:15px; font-weight:500}
.btn.primary{background:var(--ink); color:#fff}
.btn.red{background:var(--red); color:#fff}
.btn.ghost{background:#fff; border:1px solid var(--line); color:var(--ink)}
.btn.sm{padding:7px 12px; font-size:13px; border-radius:8px}
.btn:disabled{opacity:.4; cursor:default}

/* login */
.login-box{max-width:420px; margin:60px auto 0; text-align:center}
.login-box .mark{font-size:28px; font-weight:600; letter-spacing:-.5px; margin-bottom:6px}
.login-box .mark b{color:var(--red); font-weight:600}
.login-box p{color:var(--sub); font-size:14px; margin-bottom:28px}
.login-box input{width:100%; border:1px solid var(--line); border-radius:10px; padding:13px 14px; font-size:16px; margin-bottom:12px; text-align:center}
.login-box input:focus{outline:none; border-color:var(--ink)}
.chips{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:14px 0 22px}
.chip{border:1px solid var(--line); border-radius:99px; padding:6px 14px; font-size:13px; background:#fff; color:var(--ink)}
.chip:active{background:var(--soft)}

/* equipment list */
.add-row{display:flex; gap:8px; margin-bottom:20px}
.add-row input{flex:1; border:1px solid var(--line); border-radius:10px; padding:11px 13px}
.add-row input:focus{outline:none; border-color:var(--ink)}
.eq-card{border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin-bottom:10px; display:flex; align-items:center; gap:14px; background:#fff}
.eq-card .eid{font-weight:600; font-size:16px; letter-spacing:-.2px}
.eq-card .meta{font-size:12px; color:var(--sub); margin-top:2px}
.eq-card .grow{flex:1; min-width:0}
.pbar{height:5px; border-radius:99px; background:var(--soft); margin-top:8px; overflow:hidden}
.pbar i{display:block; height:100%; background:var(--ink); border-radius:99px; transition:width .3s}
.pbar i.full{background:var(--ok)}
.badge{font-size:11px; font-weight:600; padding:3px 9px; border-radius:99px; white-space:nowrap}
.badge.done{background:var(--ok-bg); color:var(--ok)}
.badge.ing{background:var(--soft); color:var(--sub)}
.badge.oot{background:var(--red-bg); color:var(--red)}
.linkdel{background:none; border:none; color:#c9c9c9; font-size:17px; padding:6px}

/* equipment detail */
.eq-head{display:flex; align-items:center; gap:12px; margin-bottom:6px; flex-wrap:wrap}
.eq-head h2{margin:0}
.area-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; margin-top:16px}
.area-card{border:1px solid var(--line); border-radius:12px; overflow:hidden; background:#fff; display:flex; flex-direction:column}
.area-card .thumb{height:130px; background:var(--soft); display:flex; align-items:center; justify-content:center; overflow:hidden}
.area-card .thumb img{width:100%; height:100%; object-fit:cover}
.area-card .body{padding:12px 14px 14px}
.area-card .nm{font-weight:600; font-size:15px}
.area-card .st{font-size:12px; color:var(--sub); margin-top:2px}
.area-card .acts{display:flex; gap:8px; margin-top:11px}
.area-card .acts .btn{flex:1}

/* area entry */
.a-top{display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap}
.a-top .back{border:none; background:none; font-size:15px; color:var(--sub); padding:4px 6px 4px 0}
.a-top h2{font-size:17px}
.gbtag{font-size:12px; color:var(--sub); border:1px solid var(--line); border-radius:99px; padding:3px 10px}
.temptabs{display:flex; gap:6px; margin-bottom:16px; overflow-x:auto; padding-bottom:2px}
.temptab{border:1px solid var(--line); background:#fff; border-radius:10px; padding:9px 14px; font-size:14px; white-space:nowrap; color:var(--ink)}
.temptab.on{background:var(--ink); color:#fff; border-color:var(--ink)}
.temptab .cnt{font-size:11px; opacity:.65; margin-left:5px}
.temptab.hasoot{border-color:var(--red); color:var(--red)}
.temptab.on.hasoot{background:var(--red); color:#fff}

.refwrap{border:1px solid var(--line); border-radius:12px; padding:10px; margin-bottom:18px; text-align:center; background:#fff}
.refwrap img{max-width:100%; max-height:420px; border-radius:8px}
.refwrap .cap{font-size:11px; color:var(--sub); margin-top:6px}
.ref2{display:flex; gap:12px; justify-content:center; flex-wrap:wrap}
.ref2 > div{flex:1; min-width:260px; max-width:440px}
.ref2 img{width:100%; max-height:none}
.ref2lb{font-size:12px; font-weight:600; color:var(--sub); margin-bottom:5px; text-align:left}

.blocklabel{font-size:13px; font-weight:600; color:var(--sub); margin:16px 0 8px}
.pt-grid{display:grid; gap:10px}
.pt-grid.c3{grid-template-columns:repeat(3,1fr)}
.pt-grid.c4{grid-template-columns:repeat(4,1fr)}
@media(max-width:680px){ .pt-grid.c3{grid-template-columns:repeat(2,1fr)} .pt-grid.c4{grid-template-columns:repeat(2,1fr)} }
.pt-card{border:1px solid var(--line); border-radius:12px; padding:10px; background:#fff}
.pt-card.oot{border-color:var(--red); background:var(--red-bg)}
.pt-card.empty-slot{visibility:hidden}
.pt-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:7px}
.pt-head .lb{font-size:12px; font-weight:600; color:var(--sub)}
.pt-card.oot .pt-head .lb{color:var(--red)}
.pt-head .flag{font-size:11px; font-weight:600; color:var(--red)}
.pt-val{width:100%; border:1px solid var(--line); border-radius:9px; padding:9px 10px; font-size:17px; font-weight:600; text-align:center; margin-bottom:8px}
.pt-val:focus{outline:none; border-color:var(--ink)}
.pt-card.oot .pt-val{border-color:var(--red); color:var(--red)}
.dz{border:1.5px dashed var(--line); border-radius:9px; min-height:96px; display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; background:var(--soft)}
.dz.drag{border-color:var(--red); background:var(--red-bg)}
.dz img{width:100%; height:130px; object-fit:cover; display:block}
.dz .ph{font-size:12px; color:#b5b5b5; text-align:center; padding:8px}
.dz .del{position:absolute; top:6px; right:6px; background:rgba(0,0,0,.55); color:#fff; border:none; border-radius:99px; width:24px; height:24px; font-size:12px; line-height:1}
.pt-btns{display:flex; gap:6px; margin-top:8px}
.pt-btns label{flex:1; text-align:center; border:1px solid var(--line); border-radius:8px; padding:7px 0; font-size:12.5px; color:var(--ink); background:#fff}
.pt-btns label:active{background:var(--soft)}
.pt-btns input{display:none}
.pt-meta{font-size:10.5px; color:#b8b8b8; margin-top:7px; text-align:right}

.savebar{position:fixed; bottom:16px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; font-size:13px; padding:9px 20px; border-radius:99px; opacity:0; transition:opacity .25s; pointer-events:none; z-index:99}
.savebar.show{opacity:1}

/* modal */
.modal-bg{position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:100; display:none; align-items:flex-start; justify-content:center; padding:30px 14px; overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:#fff; border-radius:14px; width:100%; max-width:640px; padding:22px 20px; margin:auto 0}
.modal h3{font-size:17px; font-weight:600; margin-bottom:16px}
.mod-area{border:1px solid var(--line); border-radius:10px; padding:13px; margin-bottom:12px}
.mod-area .nm{font-weight:600; font-size:14px; margin-bottom:9px}
.trow{display:flex; gap:8px; align-items:center; margin-bottom:7px}
.trow input{width:90px; border:1px solid var(--line); border-radius:8px; padding:7px 9px; text-align:center}
.trow .u{font-size:12px; color:var(--sub)}
.trow .x{background:none; border:none; color:#c9c9c9; font-size:15px; padding:4px}
.refch{font-size:12.5px; color:var(--sub); margin-top:8px; display:flex; align-items:center; gap:8px}
.mod-foot{display:flex; gap:8px; justify-content:flex-end; margin-top:16px; flex-wrap:wrap}
.mod-sec{border-top:1px solid var(--line); margin-top:18px; padding-top:14px}
.mod-sec .t{font-size:13px; font-weight:600; margin-bottom:8px}
.mod-sec .row{display:flex; gap:8px; flex-wrap:wrap}
</style>
</head>
<body>
<header>
  <span class="logo">Temp <b>Cal</b> 전자 기록 <small style="font-size:10px;color:#999">사진 강제늘림</small></span>
  <span class="spacer"></span>
  <span class="who" id="whoBox"></span>
  <button class="iconbtn" id="adminBtn">관리</button>
</header>
<main id="app"></main>
<div class="savebar" id="savebar">저장됨</div>
<div class="modal-bg" id="modalBg"><div class="modal" id="modalBox"></div></div>

<script>
/* ================= 기본 설정 ================= */
const PTS_HOTPLATE = [{x:.13,y:.82},{x:.13,y:.52},{x:.13,y:.20},{x:.50,y:.45},{x:.87,y:.82},{x:.87,y:.52},{x:.87,y:.20}];
const PTS_SHUTTLE  = [{x:.18,y:.20},{x:.50,y:.20},{x:.82,y:.20},{x:.50,y:.50},{x:.18,y:.79},{x:.50,y:.79},{x:.82,y:.79}];
const PTS_INDEXARM = [{x:.188,y:.27},{x:.396,y:.27},{x:.604,y:.27},{x:.812,y:.27},
                      {x:.188,y:.715},{x:.396,y:.715},{x:.604,y:.715},{x:.812,y:.715}];
const DEFAULT_AREAS = [
  {key:'hotplate',  no:1, name:'Hot Plate',   sheet:'HotPlate',   file:'Hotplate',   layout:'7pt',  pts:PTS_HOTPLATE,
   temps:[{t:75,gb:2},{t:90,gb:2},{t:130,gb:3},{t:155,gb:4}]},
  {key:'shuttle1',  no:2, name:'Shuttle 1',   sheet:'Shuttle1',   file:'Shuttle1',   layout:'7pt',  pts:PTS_SHUTTLE,
   temps:[{t:75,gb:2},{t:90,gb:2},{t:130,gb:3},{t:155,gb:4}]},
  {key:'shuttle2',  no:3, name:'Shuttle 2',   sheet:'Shuttle2',   file:'Shuttle2',   layout:'7pt',  pts:PTS_SHUTTLE,
   temps:[{t:75,gb:2},{t:90,gb:2},{t:130,gb:3},{t:155,gb:4}]},
  {key:'indexarm1', no:4, name:'Index Arm 1', sheet:'Index Arm1', file:'Index_Arm1', layout:'8pt', pts:PTS_INDEXARM,
   temps:[{t:75,gb:1},{t:90,gb:1},{t:130,gb:1},{t:155,gb:1}]},
  {key:'indexarm2', no:5, name:'Index Arm 2', sheet:'Index Arm2', file:'Index_Arm2', layout:'8pt', pts:PTS_INDEXARM,
   temps:[{t:75,gb:1},{t:90,gb:1},{t:130,gb:1},{t:155,gb:1}]},
];
const LABELS_7  = ['상단 좌','상단 중','상단 우','중앙','하단 좌','하단 중','하단 우'];
const LABELS_8 = ['상단 1','상단 2','상단 3','상단 4','하단 5','하단 6','하단 7','하단 8'];
function pointCount(a){ return a.layout==='8pt' ? 8 : 7; }
function pointLabel(a,i){ return a.layout==='8pt' ? `${i+1} · ${LABELS_8[i]}` : `${i+1} · ${LABELS_7[i]}`; }

/* ================= IndexedDB ================= */
const DB = {
  db:null,
  open(){ return new Promise((res,rej)=>{
    const rq = indexedDB.open('tempcal', 1);
    rq.onupgradeneeded = e=>{
      const d = e.target.result;
      d.createObjectStore('kv');
      d.createObjectStore('rec');
    };
    rq.onsuccess = e=>{ DB.db=e.target.result; res(); };
    rq.onerror = ()=>rej(rq.error);
  });},
  _tx(store,mode){ return DB.db.transaction(store,mode).objectStore(store); },
  get(store,key){ return new Promise((res,rej)=>{ const r=DB._tx(store,'readonly').get(key); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); },
  put(store,key,val){ return new Promise((res,rej)=>{ const r=DB._tx(store,'readwrite').put(val,key); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); }); },
  del(store,key){ return new Promise((res,rej)=>{ const r=DB._tx(store,'readwrite').delete(key); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); }); },
  entries(store, prefix){ return new Promise((res,rej)=>{
    const out=[]; const r=DB._tx(store,'readonly').openCursor();
    r.onsuccess=e=>{ const c=e.target.result;
      if(c){ if(!prefix || String(c.key).startsWith(prefix)) out.push({k:c.key, v:c.value}); c.continue(); }
      else res(out); };
    r.onerror=()=>rej(r.error);
  });},
};

/* ================= 상태 ================= */
const S = { worker:null, view:'login', equipId:null, areaKey:null, temp:null,
            equips:[], workers:[], areas:null, refs:null, recs:{} };

const recKey = (eq,ak,t,i)=>`${eq}|${ak}|${t}|${i}`;

async function loadBase(){
  S.areas   = (await DB.get('kv','areas'))   || JSON.parse(JSON.stringify(DEFAULT_AREAS));

  // 기존 브라우저 IndexedDB에 저장된 구형 Index Arm 설정을 강제로 최신 구조로 이관
  // 이 처리가 없으면 HTML을 수정해도 기존 7포인트 구조가 계속 출력될 수 있음
  ['indexarm1','indexarm2'].forEach(key=>{
    const current=S.areas.find(a=>a.key===key);
    const def=DEFAULT_AREAS.find(a=>a.key===key);
    if(current && def){
      current.layout='8pt';
      current.pts=JSON.parse(JSON.stringify(PTS_INDEXARM));
      current.sheet=def.sheet;
      current.file=def.file;
      current.name=def.name;
      current.no=def.no;
      current.temps=JSON.parse(JSON.stringify(def.temps));
    }else if(def){
      S.areas.push(JSON.parse(JSON.stringify(def)));
    }
  });

  S.areas.forEach(a=>{
    if(!a.pts){
      const d=DEFAULT_AREAS.find(x=>x.key===a.key);
      if(d) a.pts=JSON.parse(JSON.stringify(d.pts));
    }
  });

  // 이관된 Index Arm 설정을 다시 저장하여 이후에도 8포인트 구조 유지
  await DB.put('kv','areas',S.areas);

  S.refs    = (await DB.get('kv','refs'))    || JSON.parse(JSON.stringify(DEFAULT_REFS));
  S.equips  = (await DB.get('kv','equips'))  || [];
  S.workers = (await DB.get('kv','workers')) || [];
  const lw = sessionStorage.getItem('tc_worker');
  if(lw){ S.worker = lw; S.view='list'; }
}

  const rows = await DB.entries('rec', eqId+'|');
  rows.forEach(r=> S.recs[r.k]=r.v);
}

/* ================= 진행률 ================= */
function areaStat(eqId, area){
  let val=0, photo=0, oot=0;
  const total = area.temps.length * pointCount(area);
  area.temps.forEach(tp=>{
    for(let i=0;i<pointCount(area);i++){
      const r = S.recs[recKey(eqId,area.key,tp.t,i)];
      if(r && r.value!=null && r.value!==''){ val++;
        if(Math.abs(Number(r.value)-tp.t) > tp.gb + 1e-9) oot++; }
      if(r && r.photo) photo++;
    }
  });
  return {val, photo, oot, total, done: val===total};
}
function equipStat(eqId){
  let val=0,total=0,oot=0,doneAreas=0;
  S.areas.forEach(a=>{ const s=areaStat(eqId,a); val+=s.val; total+=s.total; oot+=s.oot; if(s.done)doneAreas++; });
  return {val,total,oot,doneAreas,done:doneAreas===S.areas.length};
}

function today(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function nowStr(){ const d=new Date(); return `${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }

function loadImg(src){ return new Promise((res,rej)=>{ const im=new Image(); im.onload=()=>res(im); im.onerror=rej; im.src=src; }); }

/* 기준 사진 위 측정값 합성 (앱 화면 · 엑셀 · 인쇄 공통)
   half: null=전체 이미지 */
async function compositeRef(area, tp, eqId, half){
  const ref=S.refs[area.key]; if(!ref) return null;
  const img=await loadImg(ref.d);
  const UP = Math.max(1, 760/img.naturalWidth);          // 선명도 확보용 업스케일
  const W = Math.round(img.naturalWidth*UP), H = Math.round(img.naturalHeight*UP);
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');
  // Hot Plate 기준 사진만 180° 회전하여 표시
  if(area.key==='hotplate'){
    ctx.save();
    ctx.translate(W,H);
    ctx.rotate(Math.PI);
    ctx.drawImage(img,0,0,W,H);
    ctx.restore();
  } else {
    ctx.drawImage(img,0,0,W,H);
  }
  const portrait = H>W*1.2;
  const r = portrait ? W*0.095 : Math.min(W,H)*0.105;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  area.pts.forEach((p,j)=>{
    const gi = half!=null ? half*8+j : j;
    const rec=S.recs[recKey(eqId,area.key,tp.t,gi)];
    const has=rec && rec.value!=null && rec.value!=='';
    const oot=has && Math.abs(Number(rec.value)-tp.t)>tp.gb+1e-9;
    // Hot Plate 번호 배열: 좌측 상단부터 1→2→3, 중앙 4,
    // 우측 상단부터 5→6→7
    const hotPlatePts = [
      {x:.13,y:.20},{x:.13,y:.52},{x:.13,y:.82},
      {x:.50,y:.45},
      {x:.87,y:.20},{x:.87,y:.52},{x:.87,y:.82}
    ];
    const dp = area.key==='hotplate' ? hotPlatePts[j] : p;
    const cx=dp.x*W, cy=dp.y*H;
    // 포인트 번호 (파랑)
    ctx.font=`bold ${Math.round(r*0.62)}px sans-serif`;
    ctx.fillStyle='#1a3bd6';
    ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=Math.max(2,r*0.12);
    // 번호는 측정 원과 겹치지 않도록 원 바깥쪽에 표시
    let nx=cx, ny=cy;
    if(area.key==='hotplate' && area.layout==='7pt' && j===3){
      // Hot Plate: 중앙 4번 번호만 원의 왼쪽에 표시
      nx=cx-r*1.38; ny=cy;
    } else if(area.key==='shuttle1' && j===3){
      // Shuttle 1: 중앙 4번 번호만 원의 우측에 표시
      nx=cx+r*1.38; ny=cy;
    } else if(area.key==='shuttle2' && j===3){
      // Shuttle 2: 중앙 4번 번호만 원의 우측에 표시
      nx=cx+r*1.38; ny=cy;
    } else if(area.key==='hotplate'){
      // Hot Plate: 1,2,3,5,6,7 번호는 측정 원 왼쪽
      nx=cx-r*1.38; ny=cy;
      const labelMargin=Math.max(8,r*0.42);
      nx=Math.max(labelMargin,Math.min(W-labelMargin,nx));
      ny=Math.max(labelMargin,Math.min(H-labelMargin,ny));
    } else {
      ny = p.y<0.5 ? cy-r-r*0.5 : cy+r+r*0.5;
      const labelMargin=Math.max(8,r*0.42);
      nx=Math.max(labelMargin,Math.min(W-labelMargin,nx));
      ny=Math.max(labelMargin,Math.min(H-labelMargin,ny));
    }
    ctx.strokeText(String(j+1), nx, ny); ctx.fillText(String(j+1), nx, ny);
    // 원
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
    if(!has){
      ctx.fillStyle='rgba(130,130,130,0.28)'; ctx.fill();
      ctx.setLineDash([r*0.25,r*0.18]); ctx.strokeStyle='rgba(90,90,90,0.8)'; ctx.lineWidth=Math.max(2,r*0.06); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.font=`bold ${Math.round(r*0.55)}px sans-serif`;
      ctx.fillText('—', cx, cy);
    } else if(!oot){
      ctx.fillStyle='rgba(214,42,42,0.9)'; ctx.fill();
      ctx.strokeStyle='#8f1414'; ctx.lineWidth=Math.max(2,r*0.06); ctx.stroke();
      ctx.fillStyle='#ffe23f'; ctx.font=`bold ${Math.round(r*0.42)}px sans-serif`;
      ctx.fillText(`${Number(rec.value).toFixed(1)}℃`, cx, cy);
    } else { // Guard Band 초과 — 반전 색으로 구분
      ctx.fillStyle='#ffdf1e'; ctx.fill();
      ctx.strokeStyle='#d40000'; ctx.lineWidth=Math.max(3,r*0.12); ctx.stroke();
      ctx.fillStyle='#c00000'; ctx.font=`bold ${Math.round(r*0.42)}px sans-serif`;
      ctx.fillText(`${Number(rec.value).toFixed(1)}℃`, cx, cy);
      ctx.font=`bold ${Math.round(r*0.30)}px sans-serif`;
      ctx.fillText('GB 초과', cx, cy+r*0.55);
    }
  });
  return {d:cv.toDataURL('image/jpeg',0.85), w:W, h:H};
}

function rotateRefImage(ref){  // 시계 방향 90° 회전 (픽셀에 굽기)
  return loadImg(ref.d).then(img=>{
    const cv=document.createElement('canvas');
    cv.width=img.naturalHeight; cv.height=img.naturalWidth;
    const ctx=cv.getContext('2d');
    ctx.translate(cv.width,0); ctx.rotate(Math.PI/2);
    ctx.drawImage(img,0,0);
    return {d:cv.toDataURL('image/jpeg',0.85), w:cv.width, h:cv.height};
  });
}
const rotatePts = pts => pts.map(p=>({x:1-p.y, y:p.x}));  // 이미지 CW90° 대응

function compressImage(file){
  return new Promise((res,rej)=>{
    const rd = new FileReader();
    rd.onload = ()=>{ const img=new Image();
      img.onload = ()=>{
        const MAX=1100, sc=Math.min(1, MAX/Math.max(img.width,img.height));
        const cv=document.createElement('canvas');
        cv.width=Math.round(img.width*sc); cv.height=Math.round(img.height*sc);
        cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
        res({d:cv.toDataURL('image/jpeg',0.78), w:cv.width, h:cv.height});
      };
      img.onerror=rej; img.src=rd.result; };
    rd.onerror=rej; rd.readAsDataURL(file);
  });
}

    const key=recKey(S.equipId,area.key,tp.t,i);

    const saveRec = async patch=>{
      const cur = S.recs[key] || {};
      const nv = {...cur, ...patch, worker:S.worker, ts:nowStr()};
      S.recs[key]=nv; await DB.put('rec',key,nv); toast();
    };

    const val=c.querySelector('.pt-val');
    val.onchange=async ()=>{
      const v=val.value.trim();
      await saveRec({value: v===''? '': Number(v)});
      render();  // OOT 표시/탭 카운트 갱신
    };

    const dz=c.querySelector('.dz');
    const setPhoto = async file=>{
      if(!file || !file.type.startsWith('image/')) return;
      toast('사진 처리 중…');
      const p=await compressImage(file);
      await saveRec({photo:p});
      render();
    };
    dz.ondragover=e=>{e.preventDefault(); dz.classList.add('drag');};
    dz.ondragleave=()=>dz.classList.remove('drag');
    dz.ondrop=e=>{e.preventDefault(); dz.classList.remove('drag'); setPhoto(e.dataTransfer.files[0]);};
    const del=c.querySelector('.dz .del');
    if(del) del.onclick=async ()=>{ await saveRec({photo:null}); render(); };
    c.querySelectorAll('.pt-btns input').forEach(inp=>{
      inp.onchange=()=>{ setPhoto(inp.files[0]); inp.value=''; };
    });
  });
}

function openAdmin(){
  const bg=$('#modalBg'), m=$('#modalBox');
  bg.classList.add('open');
  m.innerHTML = `
    <h3>관리 — 온도 · 가드밴드 · 기준 사진</h3>
    ${S.areas.map((a,ai)=>`
      <div class="mod-area" data-ai="${ai}">
        <div class="nm">${a.no}. ${esc(a.name)} <span style="font-weight:400;color:var(--sub);font-size:12px">(${pointCount(a)}포인트)</span></div>
        <div class="trows">
          ${a.temps.map((t,ti)=>`
            <div class="trow" data-ti="${ti}">
              <span class="u">온도</span><input type="number" step="0.1" class="tv" value="${t.t}">
              <span class="u">GB ±</span><input type="number" step="0.1" class="gv" value="${t.gb}">
              <button class="x" data-rm>✕</button>
            </div>`).join('')}
        </div>
        <button class="btn ghost sm" data-addt>+ 온도 추가</button>
        <div class="refch">기준 사진
          <label class="btn ghost sm" style="margin:0">교체<input type="file" accept="image/*" data-ref style="display:none"></label>
          <button class="btn ghost sm" data-rot>↻ 90° 회전</button>
          <span class="refst" style="font-size:11px;color:var(--ok)"></span>
        </div>
      </div>`).join('')}
    <div class="mod-sec">
      <div class="t">데이터</div>
      <div class="row">
        <button class="btn ghost sm" id="bkExp">백업 다운로드 (JSON)</button>
        <label class="btn ghost sm" style="margin:0">백업 복원<input type="file" accept=".json" id="bkImp" style="display:none"></label>
      </div>
      <div class="desc" style="margin-top:8px">이 시스템의 데이터는 현재 브라우저(기기)에 저장됩니다. 기기 변경 시 백업 파일로 이전하세요.</div>
    </div>
    <div class="mod-foot">
      <button class="btn ghost" id="mClose">닫기</button>
      <button class="btn red" id="mSave">저장</button>
    </div>`;

  const pendingRefs={}, pendingPts={};
  m.querySelectorAll('[data-rot]').forEach(b=>b.onclick=async ()=>{
    const box=b.closest('.mod-area'), ai=Number(box.dataset.ai);
    const cur = pendingRefs[ai] || S.refs[S.areas[ai].key];
    if(!cur) return;
    pendingRefs[ai] = await rotateRefImage(cur);
    pendingPts[ai]  = rotatePts(pendingPts[ai] || S.areas[ai].pts);
    box.querySelector('.refst').textContent='회전 예정 (저장 시 적용)';
  });
  m.querySelectorAll('[data-addt]').forEach(b=>b.onclick=()=>{
    const wrap=b.parentElement.querySelector('.trows');
    const d=document.createElement('div'); d.className='trow';
    d.innerHTML=`<span class="u">온도</span><input type="number" step="0.1" class="tv" value="">
                 <span class="u">GB ±</span><input type="number" step="0.1" class="gv" value="1">
                 <button class="x" data-rm>✕</button>`;
    d.querySelector('[data-rm]').onclick=()=>d.remove();
    wrap.appendChild(d);
  });
  m.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>b.parentElement.remove());
  m.querySelectorAll('[data-ref]').forEach(inp=>inp.onchange=async ()=>{
    const box=inp.closest('.mod-area');
    const p=await compressImage(inp.files[0]);
    pendingRefs[Number(box.dataset.ai)]=p;
    box.querySelector('.refst').textContent='변경 예정 (저장 시 적용)';
  });

  $('#mClose').onclick=()=>bg.classList.remove('open');
  $('#mSave').onclick=async ()=>{
    m.querySelectorAll('.mod-area').forEach(box=>{
      const ai=Number(box.dataset.ai);
      const temps=[];
      box.querySelectorAll('.trow').forEach(r=>{
        const t=Number(r.querySelector('.tv').value), gb=Number(r.querySelector('.gv').value);
        if(!isNaN(t) && r.querySelector('.tv').value!=='') temps.push({t, gb:isNaN(gb)?0:gb});
      });
      if(temps.length) S.areas[ai].temps=temps;
    });
    for(const ai in pendingRefs) S.refs[S.areas[ai].key]=pendingRefs[ai];
    for(const ai in pendingPts)  S.areas[ai].pts=pendingPts[ai];
    await saveAreas(); await saveRefs();
    bg.classList.remove('open'); toast('설정 저장됨'); render();
  };

  $('#bkExp').onclick=async ()=>{
    const recs=await DB.entries('rec','');
    const data={ver:1, areas:S.areas, refs:S.refs, equips:S.equips, workers:S.workers,
                recs:Object.fromEntries(recs.map(r=>[r.k,r.v]))};
    const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download=`tempcal_backup_${today()}.json`; a.click();
  };
  $('#bkImp').onchange=async e=>{
    const f=e.target.files[0]; if(!f) return;
    if(!confirm('백업을 복원하면 현재 데이터를 덮어씁니다. 진행할까요?')) return;
    const data=JSON.parse(await f.text());
    S.areas=data.areas; S.refs=data.refs; S.equips=data.equips; S.workers=data.workers||[];
    await saveAreas(); await saveRefs(); await saveEquips(); await saveWorkers();
    for(const k in data.recs) await DB.put('rec',k,data.recs[k]);
    bg.classList.remove('open'); toast('복원 완료'); S.view='list'; render();
  };
}

/* ================= 엑셀 출력 ================= */
const b64raw = d=>String(d).split(',').pop();

async function buildSheet(wb, eqId, area, tp, tIdx){
  const is8 = area.layout==='8pt';
  const ws = wb.addWorksheet(`${area.sheet} ${tp.t}`, {
    pageSetup:{ paperSize:9, orientation:'portrait',
      fitToPage:true, fitToWidth:1, fitToHeight:1, horizontalCentered:true,
      verticalCentered:false,
      margins:is8
        ? {left:0.1181,right:0.1181,top:0.1575,bottom:0.38,header:0.0394,footer:0.18}
        : {left:0.25,right:0.25,top:0.3,bottom:0.42,header:0.1,footer:0.18} },
    headerFooter:{
      oddFooter:'&L&"Arial,Regular"&10&K000000TW-P-20-04      (0)&C&"Impact,Regular"&12&K0000FFTechWing &KFF0000Confidential&R&"Arial,Regular"&10&K000000A4(210X297)',
      evenFooter:'&L&"Arial,Regular"&10&K000000TW-P-20-04      (0)&C&"Impact,Regular"&12&K0000FFTechWing &KFF0000Confidential&R&"Arial,Regular"&10&K000000A4(210X297)',
      firstFooter:'&L&"Arial,Regular"&10&K000000TW-P-20-04      (0)&C&"Impact,Regular"&12&K0000FFTechWing &KFF0000Confidential&R&"Arial,Regular"&10&K000000A4(210X297)'
    },
    properties:{ defaultRowHeight:15 }
  });

  // 열 구성
  let valCols;                       // 1-indexed 열 번호
  if(!is8){
    ws.columns=[{width:3.2},{width:26},{width:2.6},{width:26},{width:2.6},{width:26},{width:3.2}];
    valCols=[2,4,6];
  } else {
    // Index Arm 샘플 양식의 실제 열 너비와 동일
    ws.columns=[
      {width:1.5},
      {width:22.625},{width:0.75},
      {width:22.625},{width:0.75},
      {width:22.625},{width:0.75},
      {width:22.625},{width:1.5}
    ];
    valCols=[2,4,6,8];
  }
  const lastCol = is8?9:7;
  // px 기준 열 위치 계산 (이미지 중앙 배치용)
  const colPx = ws.columns.map(c=>c.width*7+5);
  const totalPx = colPx.reduce((a,b)=>a+b,0);
  const colAt = x=>{ let acc=0; for(let i=0;i<colPx.length;i++){ if(x < acc+colPx[i]) return i + (x-acc)/colPx[i]; acc+=colPx[i]; } return colPx.length-1; };

  // 제목
  ws.mergeCells(1,1,2,lastCol);
  const tc=ws.getCell(1,1);
  tc.value=` ${area.no}.${tIdx+1} ${area.name} Temp ( ${tp.t}℃ ), Guard Band : ±${tp.gb}℃`;
  tc.font={name:'맑은 고딕',size:16,bold:true};
  tc.alignment={vertical:'middle'};

  // 정보
  ws.mergeCells(3,1,3,lastCol);
  const first=(()=>{ for(let i=0;i<pointCount(area);i++){ const r=S.recs[recKey(eqId,area.key,tp.t,i)]; if(r) return r; } return null; })();
  const ic=ws.getCell(3,1);
  ic.value=`설비 : ${eqId}      작업자 : ${first?.worker || S.worker || ''}      일자 : ${today()}`;
  ic.font={name:'맑은 고딕',size:10,color:{argb:'FF666666'}};
  ic.alignment={vertical:'middle'};
  ws.getRow(3).height=18;

  // 기준 사진 + 측정값 합성 이미지 (화면과 동일하게 인쇄됨)
  let gridRow;
  if(S.refs[area.key]){
    if(!is8){
      const c=await compositeRef(area,tp,eqId,null);
      const sc=Math.min(430/c.w, 440/c.h);
      const w=c.w*sc, h=c.h*sc;
      const imgId=wb.addImage({base64:b64raw(c.d), extension:'jpeg'});
      ws.addImage(imgId,{tl:{col:colAt((totalPx-w)/2), row:4}, ext:{width:w,height:h}});
      gridRow=5+Math.ceil(h/20)+1;
    } else {
      const c=await compositeRef(area,tp,eqId,null);

      // 샘플 양식 기준: 4~15행 높이 17.1pt
      for(let r=4;r<=15;r++) ws.getRow(r).height=17.1;

      // 샘플 파일의 기준 사진 실제 크기 373 × 227px
      const w=373, h=227;
      const imgId=wb.addImage({base64:b64raw(c.d), extension:'jpeg'});

      // B5 기준으로 약간의 내부 여백을 둔 위치
      const bStartX=colPx[0];
      ws.addImage(imgId,{
        tl:{col:colAt(bStartX+18), row:4.08},
        ext:{width:w,height:h}
      });

      gridRow=17;
    }
  } else gridRow=6;

  // 값 셀 스타일
  const thin={style:'thin',color:{argb:'FFBFBFBF'}};
  const putVal=(row,col,i)=>{
    const r=S.recs[recKey(eqId,area.key,tp.t,i)];
    const cell=ws.getCell(row,col);
    cell.numFmt='0.0"℃"';
    cell.alignment={horizontal:'center',vertical:'middle'};
    cell.border={top:thin,left:thin,right:thin,bottom:thin};
    const has=r && r.value!=null && r.value!=='';
    const oot=has && Math.abs(Number(r.value)-tp.t)>tp.gb+1e-9;
    cell.value=has?Number(r.value):null;
    cell.font={name:'맑은 고딕',size:13,bold:true,color:{argb:oot?'FFD43C33':'FF3A3A3A'}};
    if(oot) cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFFDECEB'}};
    return oot?1:0;
  };
  const putPhoto=(row,col,i,boxW,boxH)=>{
    const r=S.recs[recKey(eqId,area.key,tp.t,i)];
    if(!r || !r.photo) return;

    // 모든 시트 공통:
    // 사진 원본 비율을 무시하고 지정 셀의 좌상단~우하단 경계까지 강제로 늘려 채움
    const imgId=wb.addImage({
      base64:b64raw(r.photo.d),
      extension:'jpeg'
    });

    ws.addImage(imgId,{
      tl:{col:col-1,row:row-1},
      br:{col:col,row:row},
      editAs:'oneCell'
    });
  };

  // Index Arm 전용: 사진이 셀 밖으로 벗어나지 않고 셀 내부를 최대한 채우도록 배치
  const putPhotoInCell=(row,col,i)=>{
    const r=S.recs[recKey(eqId,area.key,tp.t,i)];
    if(!r || !r.photo) return;

    const p=r.photo;
    const cellW=Math.max(20,colPx[col-1]-4);
    const cellH=Math.max(20,(ws.getRow(row).height || 48)*1.333-4);
    const sc=Math.min(cellW/p.w,cellH/p.h);
    const w=p.w*sc;
    const h=p.h*sc;

    const cellX=colPx.slice(0,col-1).reduce((a,b)=>a+b,0);
    const x=cellX+(colPx[col-1]-w)/2;
    const y=row-1+0.06;

    const imgId=wb.addImage({base64:b64raw(p.d),extension:'jpeg'});
    ws.addImage(imgId,{
      tl:{col:colAt(x),row:y},
      ext:{width:w,height:h}
    });
  };

  // 샘플 Index Arm 전용: 셀 크기와 사진 크기를 동일하게 맞춤
  const putPhotoExactCell=(row,col,i)=>{
    const r=S.recs[recKey(eqId,area.key,tp.t,i)];
    if(!r || !r.photo) return;

    // Index Arm도 원본 비율과 무관하게 셀 경계까지 강제 확대
    const imgId=wb.addImage({
      base64:b64raw(r.photo.d),
      extension:'jpeg'
    });

    ws.addImage(imgId,{
      tl:{col:col-1,row:row-1},
      br:{col:col,row:row},
      editAs:'oneCell'
    });
  };

  let oots=0, filled=0;
  const total=pointCount(area);
  const cnt=i=>{ const r=S.recs[recKey(eqId,area.key,tp.t,i)]; if(r&&r.value!=null&&r.value!=='') filled++; };

  if(!is8){
    // 7포인트: [0,1,2] / [3 중앙] / [4,5,6]
    const rows=[gridRow, gridRow+2, gridRow+4];
    const map=[ [0,1,2].map((i,j)=>({i,col:valCols[j]})),
                [{i:3,col:valCols[1]}],
                [4,5,6].map((i,j)=>({i,col:valCols[j]})) ];
    map.forEach((grp,gi)=>{
      const vr=rows[gi], pr=vr+1;
      ws.getRow(vr).height=20; ws.getRow(pr).height=125;
      grp.forEach(({i,col})=>{ cnt(i); oots+=putVal(vr,col,i); putPhoto(pr,col,i,180,160); });
    });
    gridRow=rows[2]+2;
  } else {
    /* Index Arm 샘플 양식과 동일한 셀 구조
       17행: 측정값 1~4 / 높이 21.95pt
       18행: 사진 1~4   / 높이 95.1pt
       19행: 측정값 5~8 / 높이 21.95pt
       20행: 사진 5~8   / 높이 95.1pt
       21행: 판정        / 높이 20.1pt */

    const topValRow=17, topPhotoRow=18;
    const botValRow=19, botPhotoRow=20;

    ws.getRow(topValRow).height=21.95;
    ws.getRow(topPhotoRow).height=95.1;
    ws.getRow(botValRow).height=21.95;
    ws.getRow(botPhotoRow).height=95.1;

    const setPhotoCell=(row,col)=>{
      const cell=ws.getCell(row,col);
      cell.border={top:thin,left:thin,right:thin,bottom:thin};
      cell.alignment={horizontal:'center',vertical:'middle'};
      cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFFFFFFF'}};
    };

    // 상단 1~4
    for(let cc=0;cc<4;cc++){
      const i=cc;
      const col=valCols[cc];
      cnt(i);
      oots+=putVal(topValRow,col,i);
      const vc=ws.getCell(topValRow,col);
      vc.font={name:'맑은 고딕',size:11,bold:true,color:vc.font.color};
      setPhotoCell(topPhotoRow,col);
      putPhotoExactCell(topPhotoRow,col,i);
    }

    // 하단 5~8
    for(let cc=0;cc<4;cc++){
      const i=cc+4;
      const col=valCols[cc];
      cnt(i);
      oots+=putVal(botValRow,col,i);
      const vc=ws.getCell(botValRow,col);
      vc.font={name:'맑은 고딕',size:11,bold:true,color:vc.font.color};
      setPhotoCell(botPhotoRow,col);
      putPhotoExactCell(botPhotoRow,col,i);
    }

    gridRow=21;
    ws.pageSetup.printArea='A1:I21';
    ws.pageSetup.orientation='portrait';
    ws.pageSetup.fitToPage=true;
    ws.pageSetup.fitToWidth=1;
    ws.pageSetup.fitToHeight=1;
    ws.pageSetup.scale=97;
    ws.views=[{state:'normal',showGridLines:false}];
  }

  // 판정
  ws.mergeCells(gridRow,1,gridRow,lastCol);
  const jc=ws.getCell(gridRow,1);
  const pass = filled===total && oots===0;
  jc.value = filled<total
    ? `판정 : 진행 중 ( 입력 ${filled}/${total} )`
    : (pass? `판정 : PASS ( ${total}/${total} 포인트, Guard Band 이내 )`
           : `판정 : FAIL ( Guard Band 초과 ${oots}건 )`);
  jc.font={name:'맑은 고딕',size:11,bold:true,color:{argb: filled<total?'FF8A8A8A':(pass?'FF2E8B57':'FFD43C33')}};
  jc.alignment={horizontal:'right',vertical:'middle'};
  ws.getRow(gridRow).height=20;
}

async function exportExcel(eqId, areaKey){
  toast('엑셀 생성 중…');
  try{
    const wb=new ExcelJS.Workbook();
    const areas = areaKey? [S.areas.find(a=>a.key===areaKey)] : S.areas;
    for(const a of areas){
      for(let ti=0; ti<a.temps.length; ti++) await buildSheet(wb,eqId,a,a.temps[ti],ti);
    }
    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download = areaKey? `${eqId}_${areas[0].file}.xlsx` : `${eqId}_TempCal.xlsx`;
    a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),5000);
    toast('다운로드 완료');
  }catch(err){ console.error(err); alert('엑셀 생성 오류: '+err.message); }
}
